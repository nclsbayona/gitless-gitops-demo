services:
  agent:
    build:
      context: .
      dockerfile: Containerfile
    environment:
    - PORT=8080
    volumes:
    - ./rules.yaml:/etc/agent/rules.yaml 
    ports:
    - "8080:8080"
    restart: unless-stopped

  zot:
    image: 'ghcr.io/project-zot/zot-minimal-linux-amd64:latest'
    ports:
    - '80:5000'
    restart: unless-stopped